<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Typography Interactive Lab</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:12px;
max-width:600px;
margin:auto;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

.sample{
font-size:40px;
margin:40px 0;
transition:all 0.5s ease;
}

.control{
margin:20px 0;
}

input[type=range]{
width:80%;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
background:#3498db;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#2980b9;
}

</style>

</head>

<body>

<div class="container">

<h2>Interactive Typography Lab</h2>

<p>ลองปรับค่า Typography เพื่อดูผลลัพธ์</p>

<div id="text" class="sample">
Typography
</div>

<div class="control">
Tracking
<br>
<input type="range" min="0" max="20" value="0"
oninput="changeTracking(this.value)">
</div>

<div class="control">
Leading
<br>
<input type="range" min="30" max="100" value="40"
oninput="changeLeading(this.value)">
</div>

<div class="control">
Font Size
<br>
<input type="range" min="20" max="80" value="40"
oninput="changeSize(this.value)">
</div>

<button onclick="resetText()">Reset</button>

</div>

<script>

function changeTracking(v){
document.getElementById("text").style.letterSpacing = v + "px";
}

function changeLeading(v){
document.getElementById("text").style.lineHeight = v + "px";
}

function changeSize(v){
document.getElementById("text").style.fontSize = v + "px";
}

function resetText(){

let t = document.getElementById("text");

t.style.letterSpacing = "0px";
t.style.lineHeight = "40px";
t.style.fontSize = "40px";

}

</script>

</body>
</html>
